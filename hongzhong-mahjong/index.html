<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>红中麻将</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0D1117; font-family: 'Microsoft YaHei', sans-serif; }
canvas { display: block; }

/* ====== 状态栏（仅启动时短暂显示） ====== */
#status-bar {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 10; color: #D4A545; font-size: 14px; font-weight: 500;
  background: rgba(13,17,23,0.88); padding: 5px 18px;
  border-radius: 18px; border: 1px solid rgba(212,165,69,0.4);
  white-space: nowrap; pointer-events: none;
  max-width: 92vw; overflow: hidden; text-overflow: ellipsis;
  backdrop-filter: blur(8px);
  transition: opacity 0.3s;
}
#status-bar.hide { opacity: 0; }

/* ====== 新局按钮（左下角） ====== */
#btnNewGame {
  position: fixed; bottom: 12px; left: 14px; z-index: 15;
  padding: 6px 14px; font-size: 12px; font-weight: bold;
  border: 1px solid rgba(212,165,69,0.5); border-radius: 16px;
  background: rgba(13,17,23,0.85); color: #D4A545;
  cursor: pointer; font-family: 'Microsoft YaHei', sans-serif;
  transition: all 0.2s; backdrop-filter: blur(8px);
}
#btnNewGame:hover { background: #D4A545; color: #0D1117; }

/* ====== 操作按钮 ====== */
#ui-overlay {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none; justify-content: center; gap: 14px;
  padding: 8px 10px 14px; z-index: 10;
  pointer-events: none;
  background: linear-gradient(transparent, rgba(13,17,23,0.92) 40%);
  transition: opacity 0.25s, transform 0.25s;
  opacity: 0;
  transform: translateY(10px);
}
#ui-overlay.visible {
  display: flex;
  opacity: 1;
  transform: translateY(0);
}
#ui-overlay button {
  pointer-events: auto;
  padding: 10px 22px; font-size: 19px; font-weight: bold;
  font-family: 'Microsoft YaHei', sans-serif;
  border: 2px solid #D4A545; border-radius: 10px;
  background: rgba(27,37,50,0.92); color: #D4A545;
  cursor: pointer; transition: all 0.15s;
  min-width: 72px; min-height: 46px;
  backdrop-filter: blur(4px);
}
#ui-overlay button:hover:not(:disabled) { background: #D4A545; color: #0D1117; }
#ui-overlay button:disabled { opacity: 0.2; cursor: default; }

/* 胡牌按钮 — 醒目红色 */
#ui-overlay button#btnHu:not(:disabled) {
  background: rgba(170,45,30,0.92);
  border-color: #E8533F;
  color: #FFE0D0;
  box-shadow: 0 0 12px rgba(232,83,63,0.3);
}
#ui-overlay button#btnHu:not(:disabled):hover {
  background: #E8533F;
  color: #fff;
  box-shadow: 0 0 20px rgba(232,83,63,0.5);
}

/* ====== 结果弹窗 ====== */
#result-modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.75); justify-content: center; align-items: center;
  backdrop-filter: blur(4px);
}
#result-modal.show { display: flex; }
#result-box {
  background: linear-gradient(160deg, #1A2332, #0D1117);
  border: 2px solid rgba(212,165,69,0.7); border-radius: 16px;
  padding: 28px 36px; text-align: center; color: #F5E6C8;
  max-width: 380px; width: 88%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
#result-box h2 { color: #D4A545; font-size: 26px; margin-bottom: 14px; }
#result-box .detail { font-size: 15px; margin: 8px 0; line-height: 1.6; }
#result-box .score { font-size: 20px; color: #D4A545; margin: 10px 0; }
#result-box button {
  margin-top: 16px; padding: 10px 32px; font-size: 17px;
  border: 2px solid #D4A545; border-radius: 8px;
  background: #D4A545; color: #0D1117; cursor: pointer;
  font-family: 'Microsoft YaHei', sans-serif; font-weight: bold;
  transition: all 0.2s;
}
#result-box button:hover { background: #F5E6C8; border-color: #F5E6C8; }

/* ====== 响应式 ====== */
@media (max-width: 600px) {
  #status-bar { font-size: 11px; padding: 3px 12px; top: 4px; max-width: 85vw; }
  #btnNewGame { font-size: 11px; padding: 4px 12px; bottom: 10px; left: 8px; }

  /* 操作按钮 — 移动端加大间距和触摸区域 */
  #ui-overlay { gap: 8px; padding: 6px 8px 14px; }
  #ui-overlay.visible {
    display: flex !important;
  }
  #ui-overlay button {
    padding: 14px 14px; font-size: 20px; min-width: 64px; min-height: 52px;
    border-radius: 14px;
    animation: btnSlideUp 0.3s ease-out;
  }
  /* 移动端胡牌按钮更大更醒目 */
  #ui-overlay button#btnHu:not(:disabled) {
    box-shadow: 0 0 16px rgba(232,83,63,0.5);
    border-width: 2.5px;
  }

  #result-box { padding: 16px 12px; max-width: 320px; }
  #result-box h2 { font-size: 18px; }
  #result-box .detail { font-size: 12px; }
  #result-box .score { font-size: 15px; }
  #result-box button { padding: 10px 22px; font-size: 15px; min-height: 44px; }
}

@keyframes btnSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="status-bar">红中麻将</div>
<button id="btnNewGame">新局</button>
<div id="ui-overlay">
  <button id="btnHu" disabled>胡</button>
  <button id="btnGang" disabled>杠</button>
  <button id="btnPeng" disabled>碰</button>
  <button id="btnPass" disabled>过</button>
</div>
<div id="result-modal">
  <div id="result-box">
    <h2 id="result-title"></h2>
    <div class="detail" id="result-detail"></div>
    <div class="score" id="result-score"></div>
    <button id="btnNewRound">再来一局</button>
  </div>
</div>

<script src="ai-module.js"></script>
<script src="audio-module.js"></script>
<script src="js/constants.js"></script>
<script src="js/tiles.js"></script>
<script src="js/game-state.js"></script>
<script src="js/hu-detection.js"></script>
<script src="js/scoring.js"></script>
<script src="js/actions.js"></script>
<script src="js/ai-bridge.js"></script>
<script src="js/tile-assets.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game-flow.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
